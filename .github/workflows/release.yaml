name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  packages: write

env:
  VERSION: ${{ github.ref_name }}

jobs:
  container:
    name: Publish container image
    runs-on: ubuntu-latest

    strategy:
      matrix:
        crate:
          - dhcp-template-operator
          - dhcp-template-agent

    env:
      IMAGE: ghcr.io/${{ github.repository }}/${{ matrix.crate }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Login to ghcr.io
        run: |
          echo "${GITHUB_TOKEN}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build image
        run: |
          podman build \
            --file "./crates/${{ matrix.crate }}/Containerfile" \
            --tag "${IMAGE}:${{ github.sha }}" \
            .

      - name: Push image
        run: |
          for TAG in "latest" "${VERSION}"; do
            podman tag "${IMAGE}:${{ github.sha }}" "${IMAGE}:${TAG}"
            podman push "${IMAGE}:${TAG}"
          done

  helm:
    name: Publish helm chart
    runs-on: ubuntu-latest

    needs:
      - container

    env:
      REGISTRY: ghcr.io/${{ github.repository }}/charts

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Login to ghcr.io
        run: |
          echo "$GITHUB_TOKEN" | helm registry login "ghcr.io" -u "${{ github.actor }}" --password-stdin

      - name: Package chart
        run: |
          helm package "charts/dhcp-template" --version "${VERSION}" --app-version "${VERSION}"

      - name: Push chart
        run: |
          helm push "dhcp-template-${VERSION}.tgz" "oci://${REGISTRY}"
